<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="manifest.json">
<title>Math Quiz</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #1a1a2e;
    color: #fff;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    overflow: hidden;
  }
  .page { display: none; text-align: center; width: 100%; max-width: 900px; padding: 30px; }
  .page.active { display: flex; flex-direction: column; align-items: center; gap: 30px; }

  /* PAGE 1 - HOME */
  .home-title { font-size: 2.5rem; font-weight: 700; margin-bottom: 10px; }
  .home-subtitle { font-size: 1.1rem; color: #aaa; margin-bottom: 20px; }
  .level-buttons { display: flex; gap: 25px; flex-wrap: wrap; justify-content: center; }
  .level-btn {
    width: 200px; height: 200px;
    border: none; border-radius: 25px;
    font-size: 5rem; font-weight: 800;
    cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: #fff;
  }
  .level-btn span { font-size: 1.1rem; font-weight: 400; margin-top: 8px; }
  .level-btn:hover { transform: scale(1.08); box-shadow: 0 8px 30px rgba(0,0,0,0.4); }
  .level-btn:active { transform: scale(0.95); }
  .btn-easy { background: linear-gradient(135deg, #2ecc71, #27ae60); }
  .btn-medium { background: linear-gradient(135deg, #f39c12, #e67e22); }
  .btn-hard { background: linear-gradient(135deg, #e74c3c, #c0392b); }

  /* PAGE 2 - QUESTION */
  .question-label { font-size: 1.2rem; color: #aaa; text-transform: uppercase; letter-spacing: 3px; }
  .question-text { font-size: 3.5rem; font-weight: 700; line-height: 1.3; padding: 30px; }
  .ready-btn {
    background: linear-gradient(135deg, #667eea, #764ba2);
    border: none; border-radius: 18px;
    padding: 25px 80px; font-size: 2.2rem; font-weight: 700;
    color: #fff; cursor: pointer; transition: transform 0.2s;
    text-transform: uppercase; letter-spacing: 3px;
  }
  .ready-btn:hover { transform: scale(1.05); }
  .ready-btn:active { transform: scale(0.95); }

  /* PAGE 3 - ANSWER */
  .answer-label { font-size: 1.2rem; color: #aaa; text-transform: uppercase; letter-spacing: 3px; }
  .answer-text { font-size: 4.5rem; font-weight: 800; padding: 30px; color: #f1c40f; }
  .answer-buttons { display: flex; gap: 30px; }
  .correct-btn, .incorrect-btn {
    border: none; border-radius: 18px;
    padding: 22px 55px; font-size: 1.8rem; font-weight: 700;
    color: #fff; cursor: pointer; transition: transform 0.2s;
    text-transform: uppercase;
  }
  .correct-btn { background: linear-gradient(135deg, #2ecc71, #27ae60); }
  .incorrect-btn { background: linear-gradient(135deg, #e74c3c, #c0392b); }
  .correct-btn:hover, .incorrect-btn:hover { transform: scale(1.05); }
  .correct-btn:active, .incorrect-btn:active { transform: scale(0.95); }

  /* PAGE 4 - REWARD */
  .coin-icon { font-size: 7rem; animation: bounce 1s infinite; }
  .reward-text { font-size: 2.8rem; font-weight: 700; }
  .reward-coins { font-size: 5rem; font-weight: 900; color: #f1c40f; }
  .continue-btn {
    background: linear-gradient(135deg, #1abc9c, #16a085);
    border: none; border-radius: 18px;
    padding: 22px 70px; font-size: 1.8rem; font-weight: 700;
    color: #fff; cursor: pointer; transition: transform 0.2s;
    text-transform: uppercase; letter-spacing: 2px;
  }
  .continue-btn:hover { transform: scale(1.05); }
  .continue-btn:active { transform: scale(0.95); }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
  }

  .level-badge {
    display: inline-block; padding: 6px 18px; border-radius: 20px;
    font-size: 0.9rem; font-weight: 600; text-transform: uppercase; letter-spacing: 2px;
  }
  .badge-easy { background: #2ecc71; }
  .badge-medium { background: #f39c12; }
  .badge-hard { background: #e74c3c; }
  .fullscreen-btn {
    position: fixed; top: 15px; right: 15px;
    background: rgba(255,255,255,0.15); border: none; border-radius: 10px;
    padding: 10px 14px; font-size: 1.5rem; cursor: pointer; color: #fff;
    z-index: 100; transition: opacity 0.3s;
  }
  .fullscreen-btn:hover { background: rgba(255,255,255,0.25); }
  .fullscreen-btn.hidden { opacity: 0; pointer-events: none; }
</style>
</head>
<body>

<button class="fullscreen-btn" onclick="toggleFullscreen()" id="fs-btn">⛶</button>

<!-- PAGE 1: HOME -->
<div id="page-home" class="page active">

  <div class="level-buttons">
    <button class="level-btn btn-easy" onclick="startQuiz('easy')">1<span>Easy</span></button>
    <button class="level-btn btn-medium" onclick="startQuiz('medium')">2<span>Medium</span></button>
    <button class="level-btn btn-hard" onclick="startQuiz('hard')">3<span>Hard</span></button>
  </div>
</div>

<!-- PAGE 2: QUESTION -->
<div id="page-question" class="page">
  <div class="level-badge" id="level-badge">EASY</div>
  <div class="question-label">Question</div>
  <div class="question-text" id="question-text"></div>
  <button class="ready-btn" onclick="showAnswer()">Ready</button>
</div>

<!-- PAGE 3: ANSWER -->
<div id="page-answer" class="page">
  <div class="answer-label">Answer</div>
  <div class="answer-text" id="answer-text"></div>
  <div class="answer-buttons">
    <button class="correct-btn" onclick="handleCorrect()">✅ Correct</button>
    <button class="incorrect-btn" onclick="handleIncorrect()">❌ Incorrect</button>
  </div>
</div>

<!-- PAGE 4: REWARD -->
<div id="page-reward" class="page">
  <div class="coin-icon">🪙</div>
  <div class="reward-text">YOU WON A</div>
  <div class="reward-coins" id="reward-coins">100 COIN</div>
  <button class="continue-btn" onclick="goHome()">Continue</button>
</div>

<script>
// ============================================================
// SAMPLE DATA (embedded) - Replace with CSV fetch for GitHub Pages
// ============================================================
const sampleData = {
  easy: [
    ["What is 2 + 3?", "5"],
    ["What is 10 - 4?", "6"],
    ["What is 3 x 2?", "6"],
    ["What is 8 / 2?", "4"],
    ["What is 5 + 7?", "12"],
    ["What is 9 - 3?", "6"],
    ["What is 4 x 5?", "20"],
    ["What is 15 / 3?", "5"],
    ["What is 6 + 8?", "14"],
    ["What is 20 - 11?", "9"]
  ],
  medium: [
    ["What is 12 x 12?", "144"],
    ["What is 256 / 16?", "16"],
    ["What is 45 + 78?", "123"],
    ["What is 15 squared?", "225"],
    ["What is the square root of 81?", "9"],
    ["What is 3/4 + 1/2?", "5/4 or 1.25"],
    ["What is 17 x 6?", "102"],
    ["What is 200 - 87?", "113"],
    ["What is 25% of 80?", "20"],
    ["What is 9 x 11?", "99"]
  ],
  hard: [
    ["What is 23 x 17?", "391"],
    ["What is the cube root of 729?", "9"],
    ["What is 5! (factorial)?", "120"],
    ["Solve: 2x + 5 = 21", "x = 8"],
    ["What is 18% of 450?", "81"],
    ["What is 3^5?", "243"],
    ["What is 1024 / 32?", "32"],
    ["What is log base 2 of 64?", "6"],
    ["What is 7! / 5!?", "42"],
    ["Solve: x^2 = 169", "x = 13 or x = -13"]
  ]
};

const coinValues = { easy: 100, medium: 300, hard: 500 };
const badgeClasses = { easy: 'badge-easy', medium: 'badge-medium', hard: 'badge-hard' };
const badgeLabels = { easy: 'EASY', medium: 'MEDIUM', hard: 'HARD' };

let quizData = {};
let currentLevel = '';
let currentAnswer = '';

// ============================================================
// CSV LOADING (for GitHub Pages with external files)
// ============================================================
async function loadCSV(level, filename) {
  try {
    const resp = await fetch(`data/${filename}`);
    if (!resp.ok) throw new Error('File not found');
    const text = await resp.text();
    const lines = text.trim().split('\n').filter(l => l.trim() !== '');
    return lines.map(line => {
      const idx = line.indexOf(',');
      return [line.substring(0, idx).trim(), line.substring(idx + 1).trim()];
    });
  } catch (e) {
    return null;
  }
}

async function init() {
  const easyCSV = await loadCSV('easy', 'easy.csv');
  const mediumCSV = await loadCSV('medium', 'medium.csv');
  const hardCSV = await loadCSV('hard', 'hard.csv');

  console.log('Easy loaded:', easyCSV ? easyCSV.length + ' questions' : 'FAILED');
  console.log('Medium loaded:', mediumCSV ? mediumCSV.length + ' questions' : 'FAILED');
  console.log('Hard loaded:', hardCSV ? hardCSV.length + ' questions' : 'FAILED');

  quizData.easy = easyCSV || [];
  quizData.medium = mediumCSV || [];
  quizData.hard = hardCSV || [];
}

// ============================================================
// SOUND (uses Audio API with fallback to Tone.js-style synth)
// ============================================================
function playCorrectSound() {
  try {
    const audio = new Audio('sounds/correct.mp3');
    audio.play().catch(() => synthCorrect());
  } catch(e) { synthCorrect(); }
}

function playIncorrectSound() {
  try {
    const audio = new Audio('sounds/incorrect.mp3');
    audio.play().catch(() => synthIncorrect());
  } catch(e) { synthIncorrect(); }
}

function synthCorrect() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  [523.25, 659.25, 783.99].forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.3, ctx.currentTime + i * 0.15);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + i * 0.15 + 0.3);
    osc.connect(gain).connect(ctx.destination);
    osc.start(ctx.currentTime + i * 0.15);
    osc.stop(ctx.currentTime + i * 0.15 + 0.3);
  });
}

function synthIncorrect() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(300, ctx.currentTime);
  osc.frequency.linearRampToValueAtTime(100, ctx.currentTime + 0.4);
  gain.gain.setValueAtTime(0.3, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
  osc.connect(gain).connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + 0.4);
}

// ============================================================
// FULLSCREEN
// ============================================================
function toggleFullscreen() {
  const el = document.documentElement;
  if (!document.fullscreenElement) {
    (el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen).call(el);
  } else {
    (document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen).call(document);
  }
}
document.addEventListener('fullscreenchange', () => {
  document.getElementById('fs-btn').textContent = document.fullscreenElement ? '✕' : '⛶';
});

// ============================================================
// NAVIGATION
// ============================================================
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startQuiz(level) {
  currentLevel = level;
  const questions = quizData[level];
  const idx = Math.floor(Math.random() * questions.length);
  const [question, answer] = questions[idx];
  currentAnswer = answer;

  document.getElementById('question-text').textContent = question;
  const badge = document.getElementById('level-badge');
  badge.textContent = badgeLabels[level];
  badge.className = 'level-badge ' + badgeClasses[level];

  showPage('page-question');
}

function showAnswer() {
  document.getElementById('answer-text').textContent = currentAnswer;
  showPage('page-answer');
}

function handleCorrect() {
  playCorrectSound();
  const coins = coinValues[currentLevel];
  document.getElementById('reward-coins').textContent = coins + ' COIN';
  showPage('page-reward');
}

function handleIncorrect() {
  playIncorrectSound();
  setTimeout(() => showPage('page-home'), 600);
}

function goHome() {
  showPage('page-home');
}

// Initialize
init();
</script>
</body>
</html>
